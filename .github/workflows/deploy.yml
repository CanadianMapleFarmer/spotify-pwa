name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify hosting payload
        run: |
          set -euo pipefail
          test -f index.html
          test -f app.js
          test -f styles.css
          test -f service-worker.js
          test -f manifest.webmanifest
          test -f firebase.json
          test -f .firebaserc
          test -f firestore.rules
          node --check app.js
          echo "Payload OK"

      - name: Setup Node
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy Firestore rules
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPOTIFY_TV_PWA }}
        run: |
          set -euo pipefail
          echo "$FIREBASE_SA" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          if npx --yes firebase-tools@13 deploy --only firestore:rules --project spotify-pwa-6969 --non-interactive; then
            echo "Firestore rules deployed."
          else
            echo "::warning::Firestore rules deploy failed — usually means Firestore isn't enabled yet on the project. Enable it in the Firebase Console (Build → Firestore Database → Create database), then re-run this workflow."
          fi

      - name: Deploy live (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPOTIFY_TV_PWA }}
          projectId: spotify-pwa-6969
          channelId: live

      - name: Deploy preview (pull request)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPOTIFY_TV_PWA }}
          projectId: spotify-pwa-6969
          expires: 7d
